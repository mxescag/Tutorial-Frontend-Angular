<div class="container">
    @if (id()) {
        <h1>Modificar autor</h1>
    } @else {
        <h1>Crear autor</h1>
    }

    <form>
        <mat-form-field>
            <mat-label>Identificador</mat-label>
            <input type="text" matInput placeholder="Identificador" [ngModel]="id()"  name="id" disabled>
        </mat-form-field>

        <!-- Añadimos (ngModelChange) para-->
        <mat-form-field>
            <mat-label>Nombre</mat-label>
            <input type="text" matInput placeholder="Nombre del autor" [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" required>
            <mat-error>El nombre no puede estar vacío</mat-error>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Nacionalidad</mat-label>
            <input type="text" matInput placeholder="Nacionalidad del autor" [ngModel]="nationality()" (ngModelChange)="nationality.set($event)" name="nationality" required>
            <mat-error>La nacionalidad no puede estar vacía</mat-error>
        </mat-form-field>
    </form>

    <div class="buttons">
        <button mat-stroked-button (click)="onClose()">Cerrar</button>
        <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
    </div>
</div>
